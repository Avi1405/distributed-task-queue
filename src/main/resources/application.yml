spring:
  application:
    name: distributed-task-queue
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

task-queue:
  max-attempts: ${TASK_QUEUE_MAX_ATTEMPTS:3}
  retry-base-delay: ${TASK_QUEUE_RETRY_BASE_DELAY:2s}

logging:
  level:
    com.avinash.taskqueue: INFO
